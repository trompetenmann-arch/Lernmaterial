<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lernumgebung – Wachsende Quadrate</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Inter", "Segoe UI", Roboto, sans-serif;
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --primary: #1d4ed8;
      --primary-hover: #1e40af;
      --border: #d1d5db;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .app {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 26px rgba(0, 0, 0, 0.08);
      width: min(920px, 100%);
      padding: 1.25rem;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(1.25rem, 1.8vw, 1.8rem);
    }

    .layout {
      display: grid;
      gap: 1rem;
      grid-template-columns: 1.2fr 1fr;
    }

    @media (max-width: 820px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    #viz {
      width: 100%;
      max-width: 560px;
      aspect-ratio: 1;
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: #fbfdff;
      justify-self: center;
    }

    .panel {
      display: grid;
      gap: 0.75rem;
      align-content: start;
    }

    .status {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      padding: 0.75rem;
      color: #1e3a8a;
      line-height: 1.4;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      font-size: 0.9rem;
    }

    .chip {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.22rem 0.6rem;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: #fff;
    }

    .dot {
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 50%;
      display: inline-block;
      border: 1px solid rgba(0, 0, 0, 0.2);
    }

    .controls {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      background: var(--primary);
      color: #fff;
      padding: 0.62rem 0.95rem;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover { background: var(--primary-hover); }
    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
      background: #475569;
    }

    .task-box {
      border: 1px solid #eab308;
      background: #fefce8;
      border-radius: 10px;
      padding: 0.75rem;
      display: none;
      line-height: 1.45;
    }

    .task-box.visible { display: block; }
  </style>
</head>
<body>
  <main class="app">
    <h1>Lernumgebung: Wachsende Quadratmuster</h1>

    <div class="layout">
      <svg id="viz" viewBox="0 0 520 520" role="img" aria-label="Visualisierung des Punktmusters"></svg>

      <section class="panel">
        <div id="status" class="status"></div>

        <div class="legend" aria-label="Legende">
          <span class="chip"><span class="dot" style="background:#2563eb"></span>Blau (Start)</span>
          <span class="chip"><span class="dot" style="background:#ef4444"></span>Rot (+5)</span>
          <span class="chip"><span class="dot" style="background:#22c55e"></span>Grün (+7)</span>
        </div>

        <div class="controls">
          <button id="nextBtn">Nächster Schritt</button>
          <button id="resetBtn">Neu starten</button>
          <button id="showTaskBtn" disabled>Zur Aufgabe</button>
        </div>

        <div id="taskBox" class="task-box">
          <strong>Aufgabe:</strong>
          <p>So entsteht die Zahlenfolge <strong>4, 9, 16, …</strong></p>
          <ol type="a">
            <li>Erweitere das Muster auf dem Raster mit weiteren Farben.</li>
            <li>Wie viele Punkte kommen in jedem Schritt hinzu?</li>
            <li>Wie sehen die nächsten Zahlen der Zahlenfolge aus?</li>
          </ol>
        </div>
      </section>
    </div>
  </main>

  <script>
    const svg = document.getElementById('viz');
    const status = document.getElementById('status');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const showTaskBtn = document.getElementById('showTaskBtn');
    const taskBox = document.getElementById('taskBox');

    const rings = [
      { color: '#2563eb', label: 'blau', points: [[0,0],[1,0],[0,1],[1,1]], added: 4, total: 4 },
      { color: '#ef4444', label: 'rot', points: [[0,2],[1,2],[2,2],[2,1],[2,0]], added: 5, total: 9 },
      { color: '#22c55e', label: 'grün', points: [[0,3],[1,3],[2,3],[3,3],[3,2],[3,1],[3,0]], added: 7, total: 16 }
    ];

    let step = 0;

    function drawGrid(max = 3) {
      const pad = 55;
      const size = 410;
      const unit = size / max;

      svg.innerHTML = '';

      const make = (tag, attrs) => {
        const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
        Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
        return el;
      };

      for (let i = 0; i <= max; i++) {
        const x = pad + i * unit;
        const y = pad + i * unit;
        svg.appendChild(make('line', { x1: x, y1: pad, x2: x, y2: pad + size, stroke: '#d1d5db', 'stroke-width': 1 }));
        svg.appendChild(make('line', { x1: pad, y1: y, x2: pad + size, y2: y, stroke: '#d1d5db', 'stroke-width': 1 }));
      }

      // Äußere Grenze des aktuellen Quadrats
      const outer = step === 0 ? 1 : step + 1;
      svg.appendChild(make('rect', {
        x: pad,
        y: pad + size - outer * unit,
        width: outer * unit,
        height: outer * unit,
        fill: 'none',
        stroke: '#111827',
        'stroke-width': 3
      }));

      const pointsToDraw = rings.slice(0, step + 1).flatMap(r => r.points.map(p => ({ p, color: r.color })));

      for (const { p, color } of pointsToDraw) {
        const [gx, gy] = p;
        const cx = pad + gx * unit;
        const cy = pad + size - gy * unit;
        svg.appendChild(make('circle', {
          cx,
          cy,
          r: 8,
          fill: color,
          stroke: 'rgba(0,0,0,0.25)',
          'stroke-width': 1
        }));
      }
    }

    function updateUI() {
      drawGrid(3);

      const ring = rings[step];
      const header = `Schritt ${step + 1} von ${rings.length}`;
      const detail = step === 0
        ? 'Wir starten mit einem Quadrat der Seitenlänge 1 und 4 blauen Eckpunkten.'
        : `Das Quadrat wird vergrößert. Es kommen ${ring.added} ${ring.label}e Punkte hinzu.`;

      const summary = [
        `Insgesamt liegen jetzt <strong>${ring.total}</strong> Punkte im Muster.`,
        step >= 1 ? 'Davon: 4 blau, 5 rot.' : 'Davon: 4 blau.',
        step >= 2 ? 'Zusätzlich: 7 grün.' : ''
      ].filter(Boolean).join(' ');

      status.innerHTML = `<strong>${header}</strong><br>${detail}<br>${summary}`;

      nextBtn.disabled = step >= rings.length - 1;
      showTaskBtn.disabled = step < rings.length - 1;
      if (step < rings.length - 1) taskBox.classList.remove('visible');
    }

    nextBtn.addEventListener('click', () => {
      if (step < rings.length - 1) {
        step += 1;
        updateUI();
      }
    });

    resetBtn.addEventListener('click', () => {
      step = 0;
      taskBox.classList.remove('visible');
      updateUI();
    });

    showTaskBtn.addEventListener('click', () => {
      taskBox.classList.add('visible');
      taskBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });

    updateUI();
  </script>
</body>
</html>
